<div class="group-wrapper">

  <div class="group-trigger" (click)="toggle($event)">
    <span class="group-label">{{ field.label }}</span>

    <span class="group-meta">
      @if (selected.length) {
        <span class="group-badge">{{ selected.length
        }}</span>
      }
      <span class="group-arrow" [class.open]="isOpen">›</span>
    </span>
  </div>

  @if (isOpen) {
    <div class="group-submenu" (click)="$event.stopPropagation()">
      <div class="submenu-title">{{ field.label }}</div>
      <hr class="submenu-divider" />
      <div class="submenu-options">
        @for (opt of field.options; track opt) {
          <label class="submenu-option">
            <input
              [type]="mode === 'radio' ? 'radio' : 'checkbox'"
              [name]="field.key"
              [checked]="isChecked(opt.value)"
              (change)="mode === 'checkbox' ? onToggle(opt.value, $any($event.target).checked) : onToggle(opt.value, $any($event.target).checked)"
              (click)="mode === 'radio' ? onOptionClick(opt.value) : null" />
              {{ opt.label }}
            </label>
          }
        </div>
      </div>
    }

  </div>
